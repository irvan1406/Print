<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thermal Editor HTML</title>
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons untuk Ikon -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Menghilangkan scrollbar bawaan namun tetap bisa discroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Memastikan area kerja aman di mobile (Safe Area) */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="flex flex-col h-[100dvh] bg-gray-100 font-sans overflow-hidden">

    <!-- --- TOP NAVBAR --- -->
    <header class="bg-blue-600 text-white p-2 md:p-3 flex justify-between items-center shadow-md z-30 shrink-0">
        <div class="flex items-center gap-1 md:gap-2">
            <i data-lucide="printer" class="w-5 h-5 md:w-6 md:h-6"></i>
            <h1 class="text-sm md:text-lg font-bold truncate">Thermal Editor</h1>
        </div>
        
        <div class="flex items-center gap-2 overflow-x-auto no-scrollbar pl-2">
            <select id="paperSizeSelect" class="bg-blue-700 text-white border-none rounded px-2 py-1 outline-none text-xs md:text-sm shrink-0">
                <option value="58">58mm</option>
                <option value="80">80mm</option>
            </select>
            <button id="btnPreview" class="hover:bg-blue-500 p-1.5 md:p-2 rounded flex gap-1 items-center shrink-0" title="Preview Teks Thermal">
                <i data-lucide="eye" class="w-[18px] h-[18px]"></i> <span class="hidden md:inline text-sm">Preview</span>
            </button>
            <div class="w-px h-6 bg-blue-400 mx-1 shrink-0"></div>
            <button id="btnSave" class="hover:bg-blue-500 p-1.5 md:p-2 rounded shrink-0" title="Save Local">
                <i data-lucide="save" class="w-[18px] h-[18px]"></i>
            </button>
            <button id="btnLoad" class="hover:bg-blue-500 p-1.5 md:p-2 rounded shrink-0" title="Load Local">
                <i data-lucide="upload" class="w-[18px] h-[18px]"></i>
            </button>
            <button id="btnExport" class="hover:bg-blue-500 p-1.5 md:p-2 rounded shrink-0" title="Export JSON">
                <i data-lucide="download" class="w-[18px] h-[18px]"></i>
            </button>
            <label class="hover:bg-blue-500 p-1.5 md:p-2 rounded cursor-pointer shrink-0" title="Import JSON">
                <i data-lucide="upload" class="w-[18px] h-[18px]"></i>
                <input type="file" id="fileImport" accept=".json" class="hidden" />
            </label>
            <button id="btnPrint" class="bg-green-500 hover:bg-green-400 text-white px-3 py-1.5 md:px-4 md:py-2 rounded font-bold flex items-center gap-2 ml-1 shadow shrink-0 text-sm md:text-base">
                <i data-lucide="printer" class="w-[18px] h-[18px]"></i> <span class="hidden md:inline">CETAK</span>
            </button>
        </div>
    </header>

    <!-- --- MAIN WORKSPACE --- -->
    <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
        
        <!-- --- KANVAS AREA --- -->
        <main class="order-1 md:order-2 flex-1 flex flex-col relative bg-gray-200 overflow-hidden">
            
            <!-- TOOLBAR FORMATTING -->
            <div id="toolbarFormatting" class="h-14 md:h-16 bg-white border-b border-gray-300 flex items-center px-2 md:px-4 gap-2 md:gap-4 overflow-x-auto shadow-sm shrink-0 no-scrollbar">
                
                <!-- State Aktif: Teks Terpilih -->
                <div id="toolbarActive" class="flex items-center w-full hidden">
                    <!-- BLOK 1: FONT & SIZE -->
                    <div class="flex items-center gap-1 shrink-0">
                        <select id="fontFamilySelect" class="border border-gray-300 rounded p-1.5 text-sm outline-none shrink-0">
                            <option value="Courier New">Courier New</option>
                            <option value="Arial">Arial</option>
                            <option value="Roboto">Roboto</option>
                        </select>
                        <input type="number" id="fontSizeInput" class="border border-gray-300 rounded p-1.5 text-sm w-14 outline-none shrink-0 text-center" title="Ukuran Font" />
                    </div>

                    <div class="w-px h-8 bg-gray-300 mx-1 shrink-0"></div>

                    <!-- BLOK 2: STYLE (B I U) & ALIGN -->
                    <div class="flex items-center gap-1 shrink-0 bg-gray-50 p-1 rounded border border-gray-200">
                        <button id="btnBold" class="p-1.5 rounded shrink-0 hover:bg-gray-200" title="Bold (Tebal)"><i data-lucide="bold" class="w-4 h-4"></i></button>
                        <button id="btnItalic" class="p-1.5 rounded shrink-0 hover:bg-gray-200" title="Italic (Miring)"><i data-lucide="italic" class="w-4 h-4"></i></button>
                        <button id="btnUnderline" class="p-1.5 rounded shrink-0 hover:bg-gray-200" title="Underline (Garis Bawah)"><i data-lucide="underline" class="w-4 h-4"></i></button>
                        <div class="w-px h-5 bg-gray-300 mx-1"></div>
                        <button id="btnAlignLeft" class="p-1.5 rounded shrink-0 hover:bg-gray-200" title="Align Kiri"><i data-lucide="align-left" class="w-4 h-4"></i></button>
                        <button id="btnAlignCenter" class="p-1.5 rounded shrink-0 hover:bg-gray-200" title="Align Tengah"><i data-lucide="align-center" class="w-4 h-4"></i></button>
                        <button id="btnAlignRight" class="p-1.5 rounded shrink-0 hover:bg-gray-200" title="Align Kanan"><i data-lucide="align-right" class="w-4 h-4"></i></button>
                    </div>

                    <div class="w-px h-8 bg-gray-300 mx-1 shrink-0"></div>

                    <!-- BLOK 3: NAVIGASI POSISI (X, Y dan Tombol Arah) -->
                    <div class="flex items-center gap-2 shrink-0 bg-blue-50 border border-blue-200 rounded p-1">
                        <div class="flex flex-col gap-1">
                            <div class="flex items-center gap-1 text-xs">
                                <span class="font-bold text-blue-800 w-3">X:</span>
                                <input type="number" id="inputX" class="w-14 p-0.5 border border-blue-300 rounded outline-none text-center" />
                            </div>
                            <div class="flex items-center gap-1 text-xs">
                                <span class="font-bold text-blue-800 w-3">Y:</span>
                                <input type="number" id="inputY" class="w-14 p-0.5 border border-blue-300 rounded outline-none text-center" />
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-3 grid-rows-2 gap-0.5 ml-1">
                            <div class="col-start-2"><button id="btnUp" class="bg-blue-200 hover:bg-blue-300 p-1 rounded text-blue-800" title="Atas"><i data-lucide="arrow-up" class="w-3.5 h-3.5"></i></button></div>
                            <div class="col-start-1 row-start-2"><button id="btnLeft" class="bg-blue-200 hover:bg-blue-300 p-1 rounded text-blue-800" title="Kiri"><i data-lucide="arrow-left" class="w-3.5 h-3.5"></i></button></div>
                            <div class="col-start-2 row-start-2"><button id="btnDown" class="bg-blue-200 hover:bg-blue-300 p-1 rounded text-blue-800" title="Bawah"><i data-lucide="arrow-down" class="w-3.5 h-3.5"></i></button></div>
                            <div class="col-start-3 row-start-2"><button id="btnRight" class="bg-blue-200 hover:bg-blue-300 p-1 rounded text-blue-800" title="Kanan"><i data-lucide="arrow-right" class="w-3.5 h-3.5"></i></button></div>
                        </div>
                    </div>

                    <div class="w-px h-8 bg-gray-300 mx-1 shrink-0"></div>

                    <!-- BLOK 4: MARGIN & SPACING (KURUS/RAMPING) -->
                    <div class="flex items-center gap-2 shrink-0 bg-orange-50 border border-orange-200 rounded p-1">
                        <div class="flex flex-col gap-1">
                            <div class="flex items-center gap-1 text-xs" title="Margin Kiri (Memberi jarak di kiri)">
                                <span class="font-bold text-orange-800 w-12">M.Kiri:</span>
                                <input type="number" id="inputMarginLeft" class="w-12 p-0.5 border border-orange-300 rounded outline-none text-center" />
                            </div>
                            <div class="flex items-center gap-1 text-xs" title="Margin Kanan (Memberi jarak di kanan)">
                                <span class="font-bold text-orange-800 w-12">M.Kanan:</span>
                                <input type="number" id="inputMarginRight" class="w-12 p-0.5 border border-orange-300 rounded outline-none text-center" />
                            </div>
                        </div>
                        <div class="w-px h-6 bg-orange-300 mx-1 shrink-0"></div>
                        <div class="flex flex-col gap-1">
                            <div class="flex items-center gap-1 text-xs" title="Spasi antar huruf (Minus untuk merapatkan)">
                                <span class="font-bold text-orange-800 w-9">Spasi:</span>
                                <input type="number" id="inputLetterSpacing" step="0.5" class="w-12 p-0.5 border border-orange-300 rounded outline-none text-center" />
                            </div>
                            <div class="flex items-center gap-1 text-xs" title="Lebar Teks (1 = Normal, 0.8 = Kurus/Ramping)">
                                <span class="font-bold text-orange-800 w-9">Lebar:</span>
                                <input type="number" id="inputTextScaleX" step="0.1" class="w-12 p-0.5 border border-orange-300 rounded outline-none text-center" />
                            </div>
                        </div>
                    </div>

                    <div class="w-px h-8 bg-gray-300 mx-1 shrink-0"></div>
                    
                    <!-- BLOK 5: ACTION (Copy, Delete) -->
                    <div class="flex items-center gap-1 shrink-0">
                        <button id="btnDuplicate" class="p-2 bg-gray-100 hover:bg-gray-200 rounded text-gray-700 shrink-0" title="Duplikat Baris"><i data-lucide="copy" class="w-4 h-4"></i></button>
                        <button id="btnDelete" class="p-2 bg-red-50 hover:bg-red-100 border border-red-200 rounded text-red-600 shrink-0" title="Hapus Baris"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>

                <!-- State Kosong: Tidak ada teks terpilih -->
                <div id="toolbarEmpty" class="w-full">
                    <span class="text-gray-400 text-sm md:text-base italic px-2">Ketik atau blok teks di kertas untuk mulai memformat...</span>
                </div>
            </div>

            <!-- CANVAS AREA - PURE NATIVE SELECTION DENGAN GLOBAL CONTENT-EDITABLE -->
            <div id="canvas-wrapper" class="flex-1 overflow-auto flex justify-center py-10 relative pb-32 cursor-text">
                
                <!-- KERTAS THERMAL VIRTUAL (MASTER EDITABLE) -->
                <!-- Ini adalah area bebas ketik dan blok layaknya satu lembar penuh MS Word -->
                <div 
                  id="paper-canvas"
                  contenteditable="true"
                  spellcheck="false"
                  class="bg-white shadow-2xl relative border border-gray-200 outline-none"
                  style="width: 384px; min-height: 1200px; transform: scale(1); transform-origin: top center; transition: transform 0.2s;"
                >
                    <!-- Div elemen teks akan di-inject ke sini secara otomatis -->
                </div>
            </div>

            <!-- ZOOM CONTROLS -->
            <div class="absolute bottom-4 md:bottom-6 right-4 bg-white shadow-lg rounded-full flex items-center border border-gray-200 z-20">
                <button id="btnZoomOut" class="p-2 md:p-3 hover:bg-gray-100 rounded-l-full text-gray-600" title="Zoom Out"><i data-lucide="minus" class="w-[18px] h-[18px]"></i></button>
                <span id="zoomLabel" class="px-2 md:px-3 text-xs md:text-sm font-semibold w-12 md:w-16 text-center">100%</span>
                <button id="btnZoomIn" class="p-2 md:p-3 hover:bg-gray-100 rounded-r-full text-gray-600" title="Zoom In"><i data-lucide="plus" class="w-[18px] h-[18px]"></i></button>
            </div>

        </main>

        <!-- --- SIDEBAR (TOOLS) / BOTTOM BAR DI MOBILE --- -->
        <aside class="order-2 md:order-1 w-full md:w-48 bg-white shadow-[0_-4px_10px_rgba(0,0,0,0.1)] md:shadow-lg z-30 flex flex-row md:flex-col items-center justify-around md:justify-start py-2 md:py-4 gap-1 md:gap-4 border-t md:border-r border-gray-200 overflow-x-auto shrink-0 pb-safe">
            <div class="px-4 w-full text-xs text-gray-500 font-semibold uppercase hidden md:block">Tambahkan</div>
            
            <button id="btnAddText" class="flex flex-col md:flex-row items-center gap-1 md:gap-3 p-2 md:p-3 hover:bg-gray-100 w-auto md:w-full justify-center md:justify-start rounded md:rounded-none flex-1 md:flex-none">
                <i data-lucide="type" class="w-5 h-5 text-gray-700"></i>
                <span class="text-[10px] md:text-base text-gray-700 font-medium">Teks Baru</span>
            </button>
            
            <button id="btnAddLine" class="flex flex-col md:flex-row items-center gap-1 md:gap-3 p-2 md:p-3 hover:bg-gray-100 w-auto md:w-full justify-center md:justify-start rounded md:rounded-none flex-1 md:flex-none">
                <i data-lucide="minus" class="w-5 h-5 text-gray-700"></i>
                <span class="text-[10px] md:text-base text-gray-700 font-medium whitespace-nowrap">Garis Putus</span>
            </button>

            <div class="hidden md:block w-full h-px bg-gray-200 my-2"></div>
            <div class="block md:hidden w-px h-8 bg-gray-200 mx-1"></div>
            
            <div class="px-4 w-full text-xs text-gray-500 font-semibold uppercase hidden md:block">Tindakan</div>
            
            <button id="btnUndo" class="flex flex-col md:flex-row items-center gap-1 md:gap-3 p-2 md:p-3 w-auto md:w-full justify-center md:justify-start rounded md:rounded-none flex-1 md:flex-none opacity-50 cursor-not-allowed">
                <i data-lucide="undo" class="w-5 h-5 text-gray-700"></i>
                <span class="text-[10px] md:text-base text-gray-700 font-medium">Undo</span>
            </button>
            
            <button id="btnRedo" class="flex flex-col md:flex-row items-center gap-1 md:gap-3 p-2 md:p-3 w-auto md:w-full justify-center md:justify-start rounded md:rounded-none flex-1 md:flex-none opacity-50 cursor-not-allowed">
                <i data-lucide="redo" class="w-5 h-5 text-gray-700"></i>
                <span class="text-[10px] md:text-base text-gray-700 font-medium">Redo</span>
            </button>
        </aside>

    </div>

    <!-- MODAL PREVIEW TEXT THERMAL -->
    <div id="modalPreview" class="fixed inset-0 bg-black bg-opacity-60 z-50 justify-center items-center p-4 hidden">
        <div class="bg-white rounded-lg shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
            <div class="bg-gray-100 p-4 border-b flex justify-between items-center">
                <h3 class="font-bold text-gray-800 flex items-center gap-2"><i data-lucide="square" class="w-[18px] h-[18px]"></i> Preview Print (ESC/POS)</h3>
                <button id="btnClosePreviewTop" class="text-gray-500 hover:text-red-500 font-bold">X</button>
            </div>
            <div class="p-6 overflow-auto max-h-[60vh] bg-gray-50 flex justify-center">
                <pre id="previewContent" class="bg-white shadow p-4 rounded text-sm text-gray-800" style="font-family: 'Courier New', monospace; line-height: 1.2;"></pre>
            </div>
            <div class="p-4 border-t bg-gray-100 flex justify-end gap-2">
                <button id="btnClosePreview" class="px-4 py-2 bg-gray-300 hover:bg-gray-400 rounded text-gray-800 font-semibold">Tutup</button>
                <button id="btnConfirmPrint" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded font-bold flex items-center gap-2"><i data-lucide="printer" class="w-4 h-4"></i> Cetak</button>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // Init Lucide Icons
        lucide.createIcons();

        // --- KONFIGURASI KERTAS & THERMAL ---
        const PAPER_CONFIG = {
            58: { widthPx: 384, maxChars: 32 },
            80: { widthPx: 576, maxChars: 48 }
        };

        const SPBU_TEMPLATE = [
            { id: '1', text: '<b>SPBU 54.123.45</b>', x: 0, y: 20, align: 'center', width: 384, fontSize: 16, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '2', text: 'Jl. Raya Pertamina No. 1', x: 0, y: 45, align: 'center', width: 384, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '3', text: 'Jakarta - 021999888', x: 0, y: 65, align: 'center', width: 384, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '4', text: '--------------------------------', x: 0, y: 90, align: 'center', width: 384, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '5', text: 'Tanggal', x: 10, y: 110, align: 'left', width: 150, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '6', text: 'Jam', x: 224, y: 110, align: 'right', width: 150, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '7', text: 'Receipt No.', x: 10, y: 130, align: 'left', width: 150, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '8', text: '123456789', x: 224, y: 130, align: 'right', width: 150, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '9', text: '--------------------------------', x: 0, y: 150, align: 'center', width: 384, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '10', text: 'Pump No.', x: 10, y: 170, align: 'left', width: 150, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '11', text: '09', x: 224, y: 170, align: 'right', width: 150, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '12', text: 'Grade', x: 10, y: 190, align: 'left', width: 150, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '13', text: 'PERTALITE', x: 224, y: 190, align: 'right', width: 150, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '14', text: 'Volume(L)', x: 10, y: 210, align: 'left', width: 150, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '15', text: '3.00', x: 224, y: 210, align: 'right', width: 150, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '16', text: 'Unit Price', x: 10, y: 230, align: 'left', width: 150, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '17', text: '10000', x: 224, y: 230, align: 'right', width: 150, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '18', text: 'Amount', x: 10, y: 250, align: 'left', width: 150, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '19', text: '30000', x: 224, y: 250, align: 'right', width: 150, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '20', text: '--------------------------------', x: 0, y: 270, align: 'center', width: 384, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 },
            { id: '21', text: 'TERIMA KASIH DAN SELAMAT JALAN', x: 0, y: 290, align: 'center', width: 384, fontSize: 14, fontFamily: 'Courier New', marginLeft: 0, marginRight: 0, letterSpacing: 0, textScaleX: 1 }
        ];

        // --- STATE APP ---
        let state = {
            elements: JSON.parse(JSON.stringify(SPBU_TEMPLATE)),
            selectedIds: [], 
            paperSize: 58,
            zoom: 100,
            history: [JSON.parse(JSON.stringify(SPBU_TEMPLATE))],
            historyIndex: 0
        };

        // --- DOM REFERENCES ---
        const canvas = document.getElementById('paper-canvas');
        const zoomLabel = document.getElementById('zoomLabel');
        const toolbarActive = document.getElementById('toolbarActive');
        const toolbarEmpty = document.getElementById('toolbarEmpty');
        
        // --- HISTORY MANAGEMENT ---
        function saveHistory(newElements) {
            state.history = state.history.slice(0, state.historyIndex + 1);
            state.history.push(JSON.parse(JSON.stringify(newElements)));
            state.historyIndex = state.history.length - 1;
            updateHistoryButtons();
        }

        function undo() {
            if (state.historyIndex > 0) {
                state.historyIndex--;
                state.elements = JSON.parse(JSON.stringify(state.history[state.historyIndex]));
                state.selectedIds = [];
                renderCanvas(true);
                updateHistoryButtons();
            }
        }

        function redo() {
            if (state.historyIndex < state.history.length - 1) {
                state.historyIndex++;
                state.elements = JSON.parse(JSON.stringify(state.history[state.historyIndex]));
                state.selectedIds = [];
                renderCanvas(true);
                updateHistoryButtons();
            }
        }

        function updateHistoryButtons() {
            const btnUndo = document.getElementById('btnUndo');
            const btnRedo = document.getElementById('btnRedo');
            
            if(state.historyIndex === 0) {
                btnUndo.classList.add('opacity-50', 'cursor-not-allowed');
                btnUndo.classList.remove('hover:bg-gray-100');
            } else {
                btnUndo.classList.remove('opacity-50', 'cursor-not-allowed');
                btnUndo.classList.add('hover:bg-gray-100');
            }

            if(state.historyIndex === state.history.length - 1) {
                btnRedo.classList.add('opacity-50', 'cursor-not-allowed');
                btnRedo.classList.remove('hover:bg-gray-100');
            } else {
                btnRedo.classList.remove('opacity-50', 'cursor-not-allowed');
                btnRedo.classList.add('hover:bg-gray-100');
            }
        }

        // --- CORE RENDERING ---
        function renderCanvas(forceRebuild = false) {
            canvas.style.width = PAPER_CONFIG[state.paperSize].widthPx + 'px';
            canvas.style.transform = `scale(${state.zoom / 100})`;

            const currentDOMIds = Array.from(canvas.children).map(n => n.id);
            const stateElementIds = state.elements.map(e => e.id);

            currentDOMIds.forEach(id => {
                if (!stateElementIds.includes(id)) {
                    const elToRemove = document.getElementById(id);
                    if(elToRemove) elToRemove.remove();
                }
            });

            state.elements.sort((a,b) => a.y - b.y).forEach(el => {
                let div = document.getElementById(el.id);
                if (!div || forceRebuild) {
                    if(div && forceRebuild) div.remove();
                    div = document.createElement('div');
                    div.id = el.id;
                    canvas.appendChild(div);
                }

                div.style.position = 'absolute';
                div.style.left = el.x + 'px';
                div.style.top = el.y + 'px';
                div.style.width = el.align === 'center' ? '100%' : (el.width + 'px');
                div.style.textAlign = el.align;
                div.style.fontSize = el.fontSize + 'px';
                div.style.fontFamily = el.fontFamily;
                div.style.lineHeight = '1.2';
                div.style.color = 'black';
                div.style.whiteSpace = 'pre-wrap';
                div.style.wordBreak = 'break-all';
                div.style.outline = 'none'; 
                div.style.backgroundColor = 'transparent'; 
                
                div.style.boxSizing = 'border-box';
                div.style.paddingLeft = (el.marginLeft || 0) + 'px';
                div.style.paddingRight = (el.marginRight || 0) + 'px';
                div.style.letterSpacing = (el.letterSpacing || 0) + 'px';
                
                if (el.textScaleX && el.textScaleX !== 1) {
                    div.style.transform = `scaleX(${el.textScaleX})`;
                    if (el.align === 'left') div.style.transformOrigin = 'left center';
                    else if (el.align === 'right') div.style.transformOrigin = 'right center';
                    else div.style.transformOrigin = 'center center';
                } else {
                    div.style.transform = 'none';
                }

                const plainTextForHeight = el.text.replace(/<[^>]*>/g, '');
                const lineCount = plainTextForHeight.split('\n').length;
                div.style.height = ((lineCount * el.fontSize * 1.2) + 15) + 'px';

                if (div.innerHTML !== el.text) {
                    div.innerHTML = el.text;
                }
            });

            updateToolbarUI();
            updateSelectionUI();
        }

        // Tampilkan Latar Biru Untuk Teks yang Terpilih Tanpa Merusak DOM
        function updateSelectionUI() {
            state.elements.forEach(el => {
                const div = document.getElementById(el.id);
                if (div) {
                    if (state.selectedIds.includes(el.id)) {
                        div.classList.add('bg-blue-200/50', 'z-20');
                        div.classList.remove('bg-transparent', 'z-10');
                    } else {
                        div.classList.add('bg-transparent', 'z-10');
                        div.classList.remove('bg-blue-200/50', 'z-20');
                    }
                }
            });
        }

        // --- TOOLBAR & UI SYNC ---
        function updateToolbarUI() {
            if (state.selectedIds.length > 0) {
                toolbarActive.classList.remove('hidden');
                toolbarEmpty.classList.add('hidden');

                const firstEl = state.elements.find(e => e.id === state.selectedIds[0]);
                if (firstEl) {
                    document.getElementById('fontFamilySelect').value = firstEl.fontFamily;
                    document.getElementById('fontSizeInput').value = firstEl.fontSize;
                    document.getElementById('inputX').value = Math.round(firstEl.x);
                    document.getElementById('inputY').value = Math.round(firstEl.y);
                    
                    document.getElementById('inputMarginLeft').value = firstEl.marginLeft || 0;
                    document.getElementById('inputMarginRight').value = firstEl.marginRight || 0;
                    document.getElementById('inputLetterSpacing').value = firstEl.letterSpacing || 0;
                    document.getElementById('inputTextScaleX').value = firstEl.textScaleX || 1;
                    
                    toggleBtnStyle('btnAlignLeft', firstEl.align === 'left');
                    toggleBtnStyle('btnAlignCenter', firstEl.align === 'center');
                    toggleBtnStyle('btnAlignRight', firstEl.align === 'right');
                }

                toggleBtnStyle('btnBold', document.queryCommandState('bold'));
                toggleBtnStyle('btnItalic', document.queryCommandState('italic'));
                toggleBtnStyle('btnUnderline', document.queryCommandState('underline'));

            } else {
                toolbarActive.classList.add('hidden');
                toolbarEmpty.classList.remove('hidden');

                btn.classList.add('bg-blue-200', 'text-blue-700');
                btn.classList.remove('hover:bg-gray-200');
            } else {
                btn.classList.remove('bg-blue-200', 'text-blue-700');
                btn.classList.add('hover:bg-gray-200');
            }
        }

        function updateSelectedElements(updates) {
            if (state.selectedIds.length === 0) return;
            state.elements = state.elements.map(el => {

        // --- EDITOR ACTIONS ---
        function addElement(type) {
            const newElement = {
                id: Date.now().toString(),
                text: type === 'line' ? '--------------------------------' : 'Ketik Teks Baru',
                x: 50,
                y: 50,
                align: 'center',

                fontFamily: 'Courier New',
                marginLeft: 0,
                marginRight: 0,

            };
            state.elements.push(newElement);
            state.selectedIds = [newElement.id];
            saveHistory(state.elements);
            renderCanvas(true);
            
            setTimeout(() => {
                const node = document.getElementById(newElement.id);
                if(node) {
                    const sel = window.getSelection();
                    const range = document.createRange();
                    range.selectNodeContents(node);
                    range.collapse(false);

        function deleteSelected() {
            if(state.selectedIds.length === 0) return;
            state.elements = state.elements.filter(el => !state.selectedIds.includes(el.id));
            state.selectedIds = [];
            saveHistory(state.elements);
            renderCanvas(true);
        }

        function duplicateSelected() {
            if(state.selectedIds.length === 0) return;
            const newSelection = [];
            state.selectedIds.forEach(id => {
                const el = state.elements.find(e => e.id === id);
                if(el) {
                    const copy = { ...el, id: Date.now().toString() + Math.random(), y: el.y + 25 };
                    state.elements.push(copy);
                    newSelection.push(copy.id);
                }
            });
            state.selectedIds = newSelection;
            saveHistory(state.elements);
            renderCanvas(true);
        }

        function nudgeSelected(dx, dy) {
            if (state.selectedIds.length === 0) return;
            state.elements = state.elements.map(el => {
                if (state.selectedIds.includes(el.id)) {
                    return { ...el, x: el.x + dx, y: el.y + dy };

                return el;

            saveHistory(state.elements);
            renderCanvas();

        // --- SYNCRONIZATION (Native Selection -> State Tracker) ---
        document.addEventListener('selectionchange', () => {
            const sel = window.getSelection();
            
            const toolbar = document.getElementById('toolbarFormatting');
            if (toolbar && toolbar.contains(document.activeElement)) {
                return;
            }

            if (!sel || !canvas.contains(sel.anchorNode)) {
                if(state.selectedIds.length > 0) {
                    state.selectedIds = [];
                    updateSelectionUI();
                    updateToolbarUI();
                }
                return;
            }

            const range = sel.getRangeAt(0);
            const selected = [];
            const childNodes = canvas.querySelectorAll('div[id]');

            childNodes.forEach(child => {
                const childRange = document.createRange();
                childRange.selectNodeContents(child);
                const isBefore = range.compareBoundaryPoints(Range.END_TO_START, childRange) >= 0;
                const isAfter = range.compareBoundaryPoints(Range.START_TO_END, childRange) <= 0;
                if (!isBefore && !isAfter) selected.push(child.id);
            });

            if(selected.length === 0 && sel.anchorNode) {
                let node = sel.anchorNode;
                while (node && node.id !== 'paper-canvas') {
                    if (node.id && state.elements.find(e => e.id === node.id)) {
                        selected.push(node.id);
                        break;
                    }
                    node = node.parentNode;
                }
            }

            if (JSON.stringify(state.selectedIds) !== JSON.stringify(selected)) {
                state.selectedIds = selected;
                updateSelectionUI();
            }
            updateToolbarUI();
        });

        // --- CONTENT EDITABLE INPUT SYNC ---
        function syncInput() {
            const domIds = Array.from(canvas.querySelectorAll('div[id]')).map(n => n.id);
            
            state.elements = state.elements.map(el => {
                if (!domIds.includes(el.id)) return null; 
                const node = document.getElementById(el.id);
                return { ...el, text: node.innerHTML };
            }).filter(Boolean);
        }

        canvas.addEventListener('input', () => {
            syncInput();
        });

        canvas.addEventListener('blur', () => {
             saveHistory(state.elements);
        }, true); 

        // --- KEYBOARD & ENTER HANDLERS ---
        canvas.addEventListener('keydown', (e) => {
            const sel = window.getSelection();
            if (!sel) return;

            const isChar = e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey;
            const isDelete = e.key === 'Backspace' || e.key === 'Delete';

            // ALGORITMA CERDAS: Hapus Teks Lintas Baris Persis MS Word
            if (!sel.isCollapsed && (isChar || isDelete)) {
                const getTopId = (node) => {
                    while (node && node.id !== 'paper-canvas') {
                        if (node.id && state.elements.find(el => el.id === node.id)) return node.id;
                        node = node.parentNode;
                    }
                    return null;
                };

                const startId = getTopId(sel.anchorNode);
                const endId = getTopId(sel.focusNode);

                if (startId && endId && startId !== endId) {
                    e.preventDefault(); 
                    if (state.selectedIds.length === 0) return;

                    const sortedSelected = state.elements.filter(el => state.selectedIds.includes(el.id)).sort((a,b) => a.y - b.y);
                    const topId = sortedSelected[0].id;

                    state.elements = state.elements.filter(el => !state.selectedIds.includes(el.id) || el.id === topId);
                    state.elements = state.elements.map(el => {
                        if (el.id === topId) {
                            return { ...el, text: isChar ? e.key : '' };
                        }
                        return el;
                    });

                    saveHistory(state.elements);
                    renderCanvas(true);

                    setTimeout(() => {
                        const node = document.getElementById(topId);
                        if (node) {
                            const newSel = window.getSelection();
                            const newRange = document.createRange();
                            newRange.selectNodeContents(node);
                            newRange.collapse(false);
                            newSel.removeAllRanges();
                            newSel.addRange(newRange);
                        }
                    }, 10);
                    return;
                }
            }

            if (e.key === 'Enter') {
                e.preventDefault();
                if (!sel.isCollapsed) return;

                let targetId = null;
                let node = sel.anchorNode;
                while (node && node.id !== 'paper-canvas') {
                    if (node.id && state.elements.find(el => el.id === node.id)) { targetId = node.id; break; }
                    node = node.parentNode;
                }

                if (targetId) {
                    const el = state.elements.find(x => x.id === targetId);
                    const pushAmount = el.fontSize + 10;
                    
                    const domNode = document.getElementById(targetId);
                    const range = sel.getRangeAt(0);

                    const preCaretRange = range.cloneRange();
                    preCaretRange.selectNodeContents(domNode);
                    preCaretRange.setEnd(range.startContainer, range.startOffset);
                    const divBefore = document.createElement('div');
                    divBefore.appendChild(preCaretRange.cloneContents());
                    const htmlBefore = divBefore.innerHTML;

                    const postCaretRange = range.cloneRange();
                    postCaretRange.selectNodeContents(domNode);
                    postCaretRange.setStart(range.endContainer, range.endOffset);
                    const divAfter = document.createElement('div');
                    divAfter.appendChild(postCaretRange.cloneContents());
                    const htmlAfter = divAfter.innerHTML;

                    const newElementId = Date.now().toString();

                    state.elements = state.elements.map(item => {
                        if (item.y > el.y) return { ...item, y: item.y + pushAmount };
                        if (item.id === el.id) return { ...item, text: htmlBefore };
                        return item;
                    });

                    state.elements.push({
                        ...el,
                        id: newElementId,
                        text: htmlAfter,
                        y: el.y + pushAmount,
                        marginLeft: el.marginLeft || 0,
                        marginRight: el.marginRight || 0,
                        letterSpacing: el.letterSpacing || 0,
                        textScaleX: el.textScaleX || 1
                    });

                    saveHistory(state.elements);
                    renderCanvas(true);

                    setTimeout(() => {
                        const newNode = document.getElementById(newElementId);
                        if (newNode) {
                            const newSel = window.getSelection();
                            const newRange = document.createRange();
                            newRange.selectNodeContents(newNode);
                            newRange.collapse(true);
                            newSel.removeAllRanges();
                            newSel.addRange(newRange);
                        }
                    }, 10);
                }
            }
        });

        // --- GLOBAL SHORTCUTS ---
        window.addEventListener('keydown', (e) => {
            const inCanvas = canvas.contains(document.activeElement) || canvas.contains(window.getSelection().anchorNode);
            const isTyping = e.target.isContentEditable || e.target.tagName === 'INPUT';

            if (!isTyping) {
                if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
            }

            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); }
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); }
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c') { if(!isTyping) duplicateSelected(); }

            if (state.selectedIds.length > 0 && inCanvas && e.altKey) {
                if (e.key === 'ArrowUp') { e.preventDefault(); nudgeSelected(0, -5); }
                if (e.key === 'ArrowDown') { e.preventDefault(); nudgeSelected(0, 5); }
                if (e.key === 'ArrowLeft') { e.preventDefault(); nudgeSelected(-5, 0); }
                if (e.key === 'ArrowRight') { e.preventDefault(); nudgeSelected(5, 0); }
            }
        });

        // --- THERMAL ALGORITHMS (PENERJEMAH KE KODE ESC/POS PRINTER) ---
        function stripHtml(html) {
            let tmp = document.createElement('DIV');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || "";
        }

        function alignLeftData(text, maxChars) { return text.substring(0, maxChars); }
        function alignRightData(text, maxChars) {
            if (text.length >= maxChars) return text.substring(0, maxChars);
            return " ".repeat(maxChars - text.length) + text;
        }
        function alignCenterData(text, maxChars) {
            if (text.length >= maxChars) return text.substring(0, maxChars);
            let space = Math.floor((maxChars - text.length) / 2);
            return " ".repeat(space) + text + " ".repeat(maxChars - text.length - space);
        }
        function alignLeftRightData(left, right, maxChars) {
            let space = maxChars - left.length - right.length;
            if (space <= 0) return left.substring(0, maxChars - right.length - 1) + " " + right; 
            return left + " ".repeat(space) + right;
        }

        function buildThermalData(mode = 'print') {
            const maxCharsNormal = PAPER_CONFIG[state.paperSize].maxChars;
            let lines = []; 
            
            // KODE INIT BERSIH (Tanpa ada kode "P" atau print mode yang tak lazim)
            // Ini akan memastikan printer ter-reset dengan sempurna dan terhindar dari tulisan aneh
            let data = mode === 'print' ? "\x1B\x40\x1B\x4D\x00" : "";  
            
            let sortedElements = [...state.elements].sort((a, b) => a.y - b.y);
            let rows = [];
            let currentRow = [];
            let lastY = -1000;

            sortedElements.forEach(el => {
                if (Math.abs(el.y - lastY) > 15) {
                    if (currentRow.length > 0) rows.push(currentRow);
                    currentRow = [el];
                    lastY = el.y;
                } else {
                    currentRow.push(el);
                }
            });
            if (currentRow.length > 0) rows.push(currentRow);

            rows.forEach(row => {
                row.sort((a, b) => a.x - b.x);
                if (row.length === 1) {
                    let el = row[0];
                    let plainText = stripHtml(el.text); 
                    
                    let spacesLeft = Math.max(0, Math.floor((el.marginLeft || 0) / 12));
                    if (spacesLeft > 0) plainText = " ".repeat(spacesLeft) + plainText;

                    // MENGKALKULASI UKURAN HURUF PRINTER:
                    // Di Thermal, hanya bisa membesar 2x lipat. Angka > 14 akan dicetak 2x lipat (Double Width)
                    let isDouble = el.fontSize > 14; 
                    
                    // PENTING: Jika huruf 2x lipat besarnya, maka jatah kertas otomatis terbelah dua.
                    // Dari 32 max chars menjadi 16 max chars. Agar posisinya tetap di tengah 100% persis seperti di layar.
                    let currentMaxChars = isDouble ? Math.floor(maxCharsNormal / 2) : maxCharsNormal;

                    let formattedLine = "";
                    if (el.align === 'center') formattedLine = alignCenterData(plainText, currentMaxChars);
                    else if (el.align === 'right' || el.x > (PAPER_CONFIG[state.paperSize].widthPx / 2)) formattedLine = alignRightData(plainText, currentMaxChars);
                    else formattedLine = alignLeftData(plainText, currentMaxChars);

                    if (mode === 'preview') {
                        lines.push(formattedLine);
                    } else {
                        // SETELAH DI FORMAT SPASINYA, KITA PAKSA SELURUH PRINTER RATA KIRI
                        // Hal ini mencegah printer melakukan komputasi center yang meleset
                        data += "\x1B\x61\x00"; 
                        
                        let isBold = el.text.includes('<b>') || el.text.includes('<strong>') || el.fontWeight === 'bold';
                        let isUnderline = el.text.includes('<u>') || el.textDecoration === 'underline';
                        
                        data += isBold ? "\x1B\x45\x01" : "\x1B\x45\x00";
                        data += isUnderline ? "\x1B\x2D\x01" : "\x1B\x2D\x00";

                        // Eksekusi Ukuran Font Thermal Standar
                        if (isDouble) data += "\x1D\x21\x11"; // 2x Ukuran Ganda
                        else data += "\x1D\x21\x00"; // Ukuran Normal

                        data += formattedLine + "\n";
                    }
                } 
                else if (row.length >= 2) {
                    let leftEl = row[0];
                    let rightEl = row[row.length - 1];

                    let leftText = stripHtml(leftEl.text);
                    let rightText = stripHtml(rightEl.text);

                    // Pengecekan multi kolom jika huruf membesar
                    let isDouble = leftEl.fontSize > 14 || rightEl.fontSize > 14;
                    let currentMaxChars = isDouble ? Math.floor(maxCharsNormal / 2) : maxCharsNormal;

                    let spaceCount = currentMaxChars - leftText.length - rightText.length;
                    if (spaceCount < 0) spaceCount = 1;
                    let combinedText = leftText + " ".repeat(spaceCount) + rightText;

                    if (mode === 'preview') {
                        lines.push(combinedText);
                    } else {
                        data += "\x1B\x61\x00"; // Paksa Rata Kiri
                        let isBold = leftEl.text.includes('<b>') || leftEl.text.includes('<strong>') || leftEl.fontWeight === 'bold';
                        data += isBold ? "\x1B\x45\x01" : "\x1B\x45\x00";
                        data += "\x1B\x2D\x00";

                        if (isDouble) data += "\x1D\x21\x11";
                        else data += "\x1D\x21\x00";

                        data += combinedText + "\n";
                    }
                }
            });

            if (mode === 'preview') {
                return lines.join("\n");
            } else {
                // Reset Printer Default (Keamanan Ekstra)
                data += "\x1D\x21\x00\x1B\x45\x00\x1B\x2D\x00";
                return data;
            }
        }

        const modalPreview = document.getElementById('modalPreview');

        async function executePrintData() {
            const textNormal = buildThermalData('print');
            
            if (typeof AndroidPrinter !== 'undefined') {
                try {
                    AndroidPrinter.cetakKeBluetooth("", textNormal);
                    return;
                } catch(e) {
                    console.error("Android Bridge Error", e);
                }
            }

            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
                });

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
                const char = await service.getCharacteristic('00002af1-0000-1000-8000-00805f9b34fb');

                const encoder = new TextEncoder();
                // Khusus untuk Web Bluetooth, berikan Feed Enter yang banyak dan Auto Cut
                let data = textNormal + "\n\n\n\n\x1D\x56\x41\x10"; 

                await char.writeValue(encoder.encode(data));
                alert("Print berhasil dikirim!");
            } catch(err) {
                alert("Gagal print bluetooth: Pastikan perangkat mendukung Web Bluetooth API dan printer menyala.\n\nDetail: " + err.message);
            }
        }

        document.getElementById('btnPrint').addEventListener('click', executePrintData);
        document.getElementById('btnConfirmPrint').addEventListener('click', () => {
            closePreview();
            executePrintData();
        });

        // INIT FIRST RENDER
        renderCanvas(true);

    </script>
</body>
</html>
